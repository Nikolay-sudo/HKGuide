<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .item { background: #111; border: 1px solid #333; margin: 10px auto; padding: 20px; width: 80%; cursor: pointer; }
        .item:hover { border-color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #000; border: 1px solid #555; margin: 15% auto; padding: 30px; width: 400px; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <a href="/" style="color: #666;">← НАЗАД</a>
    <div style="margin-top: 30px;">
        {% for item in items %}
        <div class="item" onclick="document.getElementById('{{ item.id }}').style.display='block'">
            <h3>{{ item.name }}</h3>
        </div>

        <div id="{{ item.id }}" class="modal" onclick="this.style.display='none'">
            <div class="modal-content" onclick="event.stopPropagation()">
                <h2>{{ item.name }}</h2>
                <hr>
                <p><strong>КАК ПОЛУЧИТЬ:</strong></p>
                <p>{{ item.how_to_get }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
