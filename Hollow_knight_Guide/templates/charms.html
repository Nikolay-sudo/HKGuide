<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Амулеты | Wiki</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Дополнительные стили для виджета, не ломающие основной CSS */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #101218;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #fff;
            width: 80%;
            max-width: 700px;
            color: #fff;
            border-radius: 10px;
            text-align: center;
        }
        .close { color: #aaa; float: right; font-size: 28px; cursor: pointer; }
        .map-img { width: 100%; max-height: 300px; object-fit: contain; margin: 15px 0; border: 1px solid #333; }
        .charm-img-small { width: 50px; height: 50px; margin-right: 15px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="void-background"></div>

<header>
    <h1 class="glitch-title">АМУЛЕТЫ</h1>
    <a href="/" class="hk-btn" style="width: 150px; font-size: 0.8em;">⬅ НАЗАД</a>
</header>

<div class="menu-container" style="max-width: 900px; margin: 40px auto; padding: 20px;">
    {% for charm in charms %}
    <div class="hk-btn" onclick="openCharm('{{ charm.id }}')" style="width: 100%; text-align: left; margin-bottom: 15px; display: flex; align-items: center;">
        <img src="{{ charm.img_url }}" alt="?" class="charm-img-small">
        <div>
            <strong>{{ charm.name }}</strong><br>
            <span style="font-size: 0.8em; color: #888;">{{ charm.short_desc }}</span>
        </div>
    </div>

    <div id="modal-{{ charm.id }}" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCharm('{{ charm.id }}')">&times;</span>
            <h2>{{ charm.name }}</h2>
            <img src="{{ charm.map_url }}" alt="Карта расположения" class="map-img">
            <div style="text-align: left; padding: 10px;">
                <p><strong>Описание:</strong> {{ charm.full_desc }}</p>
                <p><strong>Как получить:</strong> {{ charm.how_to_get }}</p>
                <p style="color: #58a6ff;">Ячеек требуется: {{ charm.slots }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function openCharm(id) {
        document.getElementById('modal-' + id).style.display = "block";
    }
    function closeCharm(id) {
        document.getElementById('modal-' + id).style.display = "none";
    }
    // Закрытие при клике вне окна
    window.onclick = function(event) {
        if (event.target.className === 'modal') {
            event.target.style.display = "none";
        }
    }
</script>

</body>
</html>
