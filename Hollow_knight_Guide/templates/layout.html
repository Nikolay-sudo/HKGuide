<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            background: #050505; color: #d1d1d1;
            font-family: 'Georgia', serif; text-align: center; margin: 0;
            overflow-x: hidden;
        }
        /* Пыль/частицы на фоне */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 80%),
                        url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; z-index: -1; pointer-events: none;
        }
        h1 {
            font-size: 3.5em; letter-spacing: 8px; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.6); margin: 60px 0 20px;
            text-transform: uppercase;
        }
        .back-btn {
            color: #666; text-decoration: none; font-style: italic;
            font-size: 1em; transition: 0.4s; letter-spacing: 2px;
        }
        .back-btn:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        .container { max-width: 900px; margin: 50px auto; padding-bottom: 100px; }

        .card {
            background: rgba(20, 20, 20, 0.85); border-left: 3px solid #333;
            border-right: 3px solid #333; margin: 25px 0; padding: 35px;
            cursor: pointer; transition: 0.5s ease; position: relative;
            overflow: hidden;
        }
        .card:hover {
            background: #111; border-color: #fff;
            transform: scale(1.03); box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        .card::after {
            content: "➤"; position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%); opacity: 0; transition: 0.3s; color: #fff;
        }
        .card:hover::after { opacity: 0.5; right: 30px; }

        .item-name { font-size: 1.4em; letter-spacing: 3px; font-weight: bold; color: #bbb; }
        .card:hover .item-name { color: #fff; }

        /* Модальное окно туториала */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 100;
        }
        .modal-content {
            background: #080808; border: 1px solid #444; margin: 12% auto;
            padding: 50px; width: 500px; text-align: left;
            box-shadow: 0 0 50px #000; animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .modal-title {
            color: #fff; border-bottom: 1px solid #222;
            padding-bottom: 15px; margin-bottom: 20px; font-size: 2em; letter-spacing: 2px;
        }
        .guide-label { color: #555; font-size: 0.8em; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .guide-text { color: #aaa; line-height: 1.8; font-size: 1.1em; font-style: italic; }
        .close-hint { color: #333; font-size: 0.8em; margin-top: 30px; text-align: right; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <a href="/" class="back-btn">← ГРЯЗЕМУТ</a>

    <div class="container">
        {% for item in items %}
        <div class="card" onclick="document.getElementById('m-{{ item.id }}').style.display='block'">
            <div class="item-name">{{ item.name }}</div>
        </div>

        <div id="m-{{ item.id }}" class="modal" onclick="this.style.display='none'">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-title">{{ item.name }}</div>
                <span class="guide-label">Туториал по получению:</span>
                <div class="guide-text">{{ item.how_to_get }}</div>
                <div class="close-hint">Кликните в любом месте, чтобы закрыть</div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
